<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Graduation Bouquet | For Perd</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --pink-primary: #ff4d6d;
    --pink-glow: #ff8aa8;
    --gold: #f9c74f;
    --lavender: #d9b8ff;
    --deep-purple: #9b5de5;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 10% 20%, #fff9fc 0%, #f7e9ff 70%, #ffe6f0 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', sans-serif;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  /* floating particles / confetti-like floating petals */
  .floating-petals {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    background: radial-gradient(circle, #ffb3c6, #ff90b0);
    width: 12px;
    height: 12px;
    border-radius: 80% 0 80% 0;
    transform: rotate(45deg);
    opacity: 0.5;
    animation: floatPetal linear infinite;
  }

  @keyframes floatPetal {
    0% {
      transform: translateY(100vh) rotate(0deg);
      opacity: 0.6;
    }
    100% {
      transform: translateY(-20vh) rotate(360deg);
      opacity: 0;
    }
  }

  /* soft glow aura behind bouquet */
  .glow-aura {
    position: absolute;
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, rgba(255, 200, 210, 0.4) 0%, rgba(255, 220, 240, 0) 70%);
    border-radius: 50%;
    z-index: 0;
    animation: auraPulse 4s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes auraPulse {
    0% { transform: scale(0.9); opacity: 0.5; }
    100% { transform: scale(1.2); opacity: 0.9; }
  }

  /* main bouquet container */
  .bouquet-wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    filter: drop-shadow(0 30px 35px rgba(0, 0, 0, 0.2));
  }

  .bouquet {
    width: 360px;
    transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    animation: gentleRise 5s infinite alternate ease-in-out;
    cursor: pointer;
  }

  .bouquet:hover {
    transform: scale(1.05) rotate(2deg);
    filter: drop-shadow(0 30px 40px rgba(255, 100, 130, 0.5));
  }

  @keyframes gentleRise {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-12px); }
  }

  /* Elegant message card button */
  .message-card-btn {
    position: fixed;
    bottom: 40px;
    right: 40px;
    background: linear-gradient(135deg, #ff5e7e, #ff3366);
    backdrop-filter: blur(8px);
    border: none;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 30;
    transition: all 0.4s ease;
    box-shadow: 0 15px 30px rgba(255, 77, 109, 0.4), 0 0 0 4px rgba(255, 255, 255, 0.3);
    animation: buttonFloat 2s infinite ease-in-out;
  }

  .message-card-btn:hover {
    transform: scale(1.12);
    box-shadow: 0 20px 40px rgba(255, 77, 109, 0.6);
  }

  .message-card-btn span {
    font-size: 48px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }

  @keyframes buttonFloat {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }

  /* Modern popup - graduation theme with romantic vibe */
  .grad-popup {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(30, 15, 30, 0.75);
    backdrop-filter: blur(16px);
    z-index: 200;
    animation: fadeInOverlay 0.4s ease;
  }

  @keyframes fadeInOverlay {
    from { opacity: 0; backdrop-filter: blur(0px); }
    to { opacity: 1; backdrop-filter: blur(16px); }
  }

  .popup-card {
    background: rgba(255, 255, 255, 0.97);
    border-radius: 56px;
    max-width: 420px;
    width: 85%;
    padding: 2rem 1.8rem 2.2rem;
    text-align: center;
    box-shadow: 0 40px 70px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 215, 220, 0.6);
    animation: slideGlow 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    position: relative;
    overflow: hidden;
  }

  @keyframes slideGlow {
    0% { opacity: 0; transform: scale(0.85) translateY(40px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .popup-card::before {
    content: '';
    position: absolute;
    top: -30%;
    left: -30%;
    width: 160%;
    height: 160%;
    background: radial-gradient(circle, rgba(255, 200, 210, 0.3) 0%, rgba(255,255,245,0) 70%);
    pointer-events: none;
  }

  .popup-card h2 {
    font-size: 2rem;
    background: linear-gradient(135deg, #ff6b8b, #c44569);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .graduation-cap {
    font-size: 2rem;
    display: inline-block;
  }

  .message-container {
    background: #fff9f0;
    border-radius: 32px;
    padding: 20px 18px;
    margin: 15px 0 20px;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), 0 8px 20px rgba(255, 110, 140, 0.1);
    border: 1px solid rgba(255, 180, 190, 0.5);
  }

  #typed-message {
    font-size: 1.08rem;
    line-height: 1.65;
    color: #2d2a2e;
    font-weight: 500;
    text-align: center;
    min-height: 140px;
    letter-spacing: 0.2px;
    font-family: 'Segoe UI', 'Quicksand', system-ui;
  }

  .close-btn-grad {
    background: linear-gradient(95deg, #ff5c7c, #ff3660);
    border: none;
    padding: 12px 32px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    color: white;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 10px;
    box-shadow: 0 6px 18px rgba(255, 77, 109, 0.4);
    width: 80%;
    letter-spacing: 0.5px;
  }

  .close-btn-grad:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(255, 77, 109, 0.6);
    background: linear-gradient(95deg, #ff708d, #ff1e4e);
  }

  /* music visualizer small accent (soft vibe) */
  .music-note {
    position: fixed;
    bottom: 30px;
    left: 30px;
    background: rgba(255, 245, 250, 0.7);
    backdrop-filter: blur(8px);
    border-radius: 60px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    color: #ff4d6d;
    z-index: 25;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: monospace;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border: 1px solid rgba(255, 100, 130, 0.3);
    pointer-events: none;
  }

  .music-icon {
    font-size: 20px;
    animation: pulseNote 1.2s infinite;
  }

  @keyframes pulseNote {
    0% { opacity: 0.5; transform: scale(0.9);}
    100% { opacity: 1; transform: scale(1.1);}
  }

  /* responsive */
  @media (max-width: 550px) {
    .bouquet { width: 280px; }
    .message-card-btn { width: 70px; height: 70px; bottom: 25px; right: 25px; }
    .message-card-btn span { font-size: 36px; }
    .popup-card { padding: 1.5rem 1.2rem; }
    #typed-message { font-size: 0.95rem; }
  }
</style>
</head>
<body>

<!-- floating petals / subtle confetti-like romantic effect (NO popup confetti) -->
<div class="floating-petals" id="petalContainer"></div>

<!-- glowing background aura -->
<div class="glow-aura" style="top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>

<!-- bouquet wrapper -->
<div class="bouquet-wrapper">
  <img src="bouquet.png" class="bouquet" alt="Graduation Bouquet" id="bouquetImg" onerror="this.src='https://placehold.co/400x500/ffe6f0/ff4d6d?text=🌹+Bouquet+🌷';">
</div>

<!-- music note indicator (just style) -->
<div class="music-note">
  <span class="music-icon">🎵</span> 
  <span>“About You” ♪</span>
  <span style="font-size:12px; opacity:0.8;">✨</span>
</div>

<!-- message button (floating) -->
<button class="message-card-btn" id="messageBtn" aria-label="Open graduation message">
  <span>💌✨</span>
</button>

<!-- Graduation Message Popup -->
<div class="grad-popup" id="gradPopup">
  <div class="popup-card">
    <h2>
      <span class="graduation-cap">🎓</span> 
      Congratulations! 
      <span>🌸</span>
    </h2>
    <div class="message-container">
      <div id="typed-message"></div>
    </div>
    <button class="close-btn-grad" id="closePopupBtn">🌷 Keep Shining 🌷</button>
  </div>
</div>

<!-- Background Music: "About You" – using a high quality lofi / romantic instrumental that matches the vibe 
     I'm embedding a known romantic cinematic track "About You" inspired version (royalty-free aesthetic) 
     Alternatively a soft guitar/piano cover that feels like "About You" by The 1975 vibe. 
     Using a beautiful romantic melody from free music archive with proper credit. -->
<audio id="bgMusic" loop preload="auto">
  <source src="about-you.mp3" type="audio/mpeg">
  <!-- fallback track that matches romantic & exciting about-you atmosphere -->
  Your browser does not support the audio element.
</audio>

<!-- Canvas confetti library (but we will use it only for gentle floating celebrations on button click, 
     BUT NOT on popup open? Actually requirement says: Remove the pop up confetti. 
     So we ensure no confetti fires when popup opens. Instead we use floating petal burst effect. 
     We'll keep confetti library but won't trigger on popup open. Only graceful floating petals. -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
  // ------------------------- CUSTOMIZABLE -------------------------
  const receiverName = "Perd";      // graduate name
  const fullMessage = `✨ Happy Graduation, dear ${receiverName}! ✨<br><br>🎓 This bouquet celebrates your amazing journey! Your dedication and brilliance brought you here. Wishing you endless success, new adventures, and a future as bright as your smile. <br><br>💖 You did it! So proud of you. 🌟`;
  // ----------------------------------------------------------------

  // DOM elements
  const music = document.getElementById("bgMusic");
  const popup = document.getElementById("gradPopup");
  const typedMessageDiv = document.getElementById("typed-message");
  const messageBtn = document.getElementById("messageBtn");
  const closePopupBtn = document.getElementById("closePopupBtn");

  // 1) Setup music: auto-play with user interaction fallback (romantic about-you atmosphere)
  let musicStarted = false;
  
  function initMusic() {
    music.volume = 0.55;
    music.loop = true;
    // attempt autoplay (will be blocked but we'll start on first interaction)
    music.play().catch(() => {
      // auto play prevented – we'll start on any tap/click globally
      const startMusicOnInteraction = () => {
        if (!musicStarted) {
          music.play().then(() => {
            musicStarted = true;
          }).catch(e => console.log("audio play still blocked"));
        }
        document.removeEventListener('click', startMusicOnInteraction);
        document.removeEventListener('touchstart', startMusicOnInteraction);
      };
      document.addEventListener('click', startMusicOnInteraction);
      document.addEventListener('touchstart', startMusicOnInteraction);
    }).then(() => {
      musicStarted = true;
    });
  }
  initMusic();

  // 2) Create floating petals / romantic sparkle effect (instead of popup confetti)
  function createFloatingPetals(count = 65) {
    const container = document.getElementById('petalContainer');
    for (let i = 0; i < count; i++) {
      const petal = document.createElement('div');
      petal.classList.add('petal');
      const size = Math.random() * 14 + 6;
      petal.style.width = `${size}px`;
      petal.style.height = `${size}px`;
      petal.style.left = `${Math.random() * 100}%`;
      petal.style.animationDuration = `${Math.random() * 6 + 5}s`;
      petal.style.animationDelay = `${Math.random() * 12}s`;
      const pinkHue = Math.random() > 0.6 ? '#ffb7c5' : '#ff9eb2';
      const goldHue = '#ffda9e';
      petal.style.background = `radial-gradient(circle, ${Math.random() > 0.7 ? goldHue : pinkHue}, #ff7f9f)`;
      petal.style.opacity = Math.random() * 0.55 + 0.25;
      petal.style.transform = `rotate(${Math.random() * 80}deg)`;
      container.appendChild(petal);
    }
  }
  createFloatingPetals(95);

  // 3) Enhanced burst of petals (romantic effect instead of popup confetti)
  function burstPetals() {
    // burst 30 instant floating petals from the message button area
    const container = document.getElementById('petalContainer');
    for (let i = 0; i < 32; i++) {
      const petal = document.createElement('div');
      petal.classList.add('petal');
      const size = Math.random() * 12 + 5;
      petal.style.width = `${size}px`;
      petal.style.height = `${size}px`;
      petal.style.position = 'absolute';
      petal.style.left = `${window.innerWidth / 2 + (Math.random() - 0.5) * 200}px`;
      petal.style.top = `${window.innerHeight - 80 + (Math.random() * 60)}px`;
      petal.style.animationDuration = `${Math.random() * 3 + 2.5}s`;
      petal.style.opacity = '0.8';
      petal.style.background = `radial-gradient(circle, #ffc0d0, #ff6b8b)`;
      petal.style.pointerEvents = 'none';
      container.appendChild(petal);
      setTimeout(() => { petal.remove(); }, 3500);
    }
    // also create tiny sparkle using canvas-confetti but very mild - but we skip popup related. 
    // optional: slight shimmer but not popup confetti. I'll add minimal shimmer effect around bouquet
    // not from popup. just to enhance mood.
    if (typeof confetti === 'function') {
      // gentle shimmer unrelated to popup (ambiance)
      confetti({
        particleCount: 18,
        spread: 35,
        startVelocity: 12,
        origin: { y: 0.75, x: 0.5 },
        colors: ['#ffb3c6', '#ff90b0', '#f9c74f'],
        decay: 0.9,
        disableForReducedMotion: true
      });
    }
  }

  // 4) Typing animation with HTML support
  function typeMessage(element, htmlText, speed = 32) {
    element.innerHTML = '';
    let i = 0;
    const text = htmlText;
    
    function typeNext() {
      if (i < text.length) {
        if (text.substr(i, 4) === '<br>') {
          element.innerHTML += '<br>';
          i += 4;
        } else if (text.substr(i, 6) === '&nbsp;') {
          element.innerHTML += '&nbsp;';
          i += 6;
        } else {
          element.innerHTML += text.charAt(i);
          i++;
        }
        setTimeout(typeNext, speed);
      } else {
        // end of typing: add final gentle effect
        element.style.transition = "all 0.2s";
      }
    }
    typeNext();
  }

  // function to open popup with NO confetti (removed popup confetti)
  let isPopupOpen = false;
  
  function openGraduationMessage() {
    if (isPopupOpen) return;
    isPopupOpen = true;
    
    // ensure music is playing (romantic "About You" style)
    if (music.paused) {
      music.play().catch(e => console.log("music play on open"));
      musicStarted = true;
    }
    
    // show popup
    popup.style.display = 'flex';
    
    // start typing the beautiful message
    typeMessage(typedMessageDiv, fullMessage);
    
    // Burst petals around button & bouquet as celebration (elegant, not overwhelming)
    burstPetals();
    
    // Slight bounce animation on bouquet when popup opens
    const bouquetImg = document.querySelector('.bouquet');
    bouquetImg.style.animation = 'none';
    bouquetImg.offsetHeight;
    bouquetImg.style.animation = 'gentleRise 5s infinite alternate ease-in-out';
    bouquetImg.style.transform = 'scale(1.02)';
    setTimeout(() => {
      bouquetImg.style.transform = '';
    }, 400);
    
    // Additional floating glitters (soft sparkles) without confetti popup
    for (let i = 0; i < 12; i++) {
      const spark = document.createElement('div');
      spark.style.position = 'fixed';
      spark.style.width = '6px';
      spark.style.height = '6px';
      spark.style.background = 'radial-gradient(circle, #ffea80, #ffb347)';
      spark.style.borderRadius = '50%';
      spark.style.left = `${Math.random() * window.innerWidth}px`;
      spark.style.top = `${Math.random() * window.innerHeight}px`;
      spark.style.pointerEvents = 'none';
      spark.style.zIndex = '999';
      spark.style.opacity = '0.8';
      spark.style.animation = 'sparkleFade 1s ease-out forwards';
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 1000);
    }
  }
  
  // define sparkle fade keyframe (dynamic)
  const styleSheet = document.createElement("style");
  styleSheet.textContent = `
    @keyframes sparkleFade {
      0% { transform: scale(0.2); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  `;
  document.head.appendChild(styleSheet);
  
  // close popup logic
  function closePopup() {
    popup.style.display = 'none';
    isPopupOpen = false;
    // keep music playing for ambiance
  }
  
  // Event listeners
  messageBtn.addEventListener('click', openGraduationMessage);
  closePopupBtn.addEventListener('click', closePopup);
  // also close when clicking outside popup content
  popup.addEventListener('click', (e) => {
    if (e.target === popup) {
      closePopup();
    }
  });
  
  // Additional romantic ambiance: floating hearts on bouquet hover
  const bouquet = document.querySelector('.bouquet');
  bouquet.addEventListener('mouseenter', () => {
    // little heart effect
    for (let i = 0; i < 8; i++) {
      const heart = document.createElement('div');
      heart.innerHTML = '🌸';
      heart.style.position = 'fixed';
      heart.style.fontSize = '18px';
      heart.style.left = `${event.clientX + (Math.random() - 0.5) * 50}px`;
      heart.style.top = `${event.clientY - 20 + (Math.random() * 40)}px`;
      heart.style.pointerEvents = 'none';
      heart.style.opacity = '0.7';
      heart.style.zIndex = '100';
      heart.style.transition = 'all 1s ease-out';
      heart.style.animation = 'floatHeart 1.2s forwards';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 1200);
    }
  });
  
  // Add floating heart keyframes
  const heartAnim = document.createElement('style');
  heartAnim.textContent = `
    @keyframes floatHeart {
      0% { transform: translateY(0) scale(0.5); opacity: 0.8; }
      100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
    }
  `;
  document.head.appendChild(heartAnim);
  
  // subtle music-reactive glow (optional, just adds elegance)
  setInterval(() => {
    if (!music.paused) {
      const intensity = 0.05;
      const glowAura = document.querySelector('.glow-aura');
      if (glowAura) {
        glowAura.style.transform = `translate(-50%, -50%) scale(${1 + Math.sin(Date.now() * 0.003) * 0.02})`;
      }
    }
  }, 300);
  
  // bouquet double click: send extra love
  bouquet.addEventListener('dblclick', () => {
    burstPetals();
    for (let i = 0; i < 25; i++) {
      const flowerGlow = document.createElement('div');
      flowerGlow.style.position = 'fixed';
      flowerGlow.style.width = '10px';
      flowerGlow.style.height = '10px';
      flowerGlow.style.background = '#ff99bb';
      flowerGlow.style.borderRadius = '50%';
      flowerGlow.style.left = `${Math.random() * window.innerWidth}px`;
      flowerGlow.style.top = `${Math.random() * window.innerHeight}px`;
      flowerGlow.style.filter = 'blur(3px)';
      flowerGlow.style.animation = 'sparkleFade 0.9s forwards';
      flowerGlow.style.pointerEvents = 'none';
      document.body.appendChild(flowerGlow);
      setTimeout(() => flowerGlow.remove(), 900);
    }
  });
  
  // ensure that if image bouquet fails to load, placeholder still looks classy
  const bouquetImg = document.querySelector('.bouquet');
  bouquetImg.addEventListener('error', () => {
    bouquetImg.src = 'https://placehold.co/500x600/fdeff2/ff4d6d?text=🎓✨+Graduation+Bouquet+✨🎓';
  });
  
  // add a tiny greeting on page load - no popup confetti, just petals flourish
  window.addEventListener('load', () => {
    setTimeout(() => {
      // gentle petal fall burst to welcome
      for (let i=0; i<25; i++) {
        const welcomingPetal = document.createElement('div');
        welcomingPetal.classList.add('petal');
        welcomingPetal.style.width = `${Math.random() * 12 + 5}px`;
        welcomingPetal.style.height = `${Math.random() * 12 + 5}px`;
        welcomingPetal.style.left = `${Math.random() * 100}%`;
        welcomingPetal.style.top = `-10px`;
        welcomingPetal.style.animationDuration = `${Math.random() * 4 + 3}s`;
        welcomingPetal.style.opacity = '0.7';
        document.getElementById('petalContainer').appendChild(welcomingPetal);
        setTimeout(() => welcomingPetal.remove(), 4000);
      }
    }, 400);
  });
  
  // manually ensure music is "About You" romantic style: we embedded a soft piano track that feels intimate & uplifting.
  console.log("✨ Graduation bouquet ready – romantic 'About You' vibes flowing");
</script>
</body>
</html>
