<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graduation Surprise</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .bouquet {
      width: 250px;
      margin-bottom: 20px;
    }

    .message-btn {
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .message-btn:hover {
      transform: scale(1.1);
    }

    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      max-width: 300px;
      animation: fadeIn 0.5s;
    }

    .popup-content h2 {
      color: #4CAF50;
    }

    .close-btn {
      margin-top: 15px;
      padding: 8px 15px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.8);}
      to {opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>

  <!-- Replace with your image filename -->
  <img src="bouquet.png" class="bouquet" alt="Bouquet">

  <button class="message-btn" onclick="showMessage()">💌</button>

  <div class="popup" id="popup">
    <div class="popup-content">
      <h2> Congratulations!</h2>
      <p>
        Happy Graduation 🎉<br>
        Congrats and I hope for the best.
      </p>
      <button class="close-btn" onclick="closeMessage()">Close</button>
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("popup").style.display = "flex";
    }

    function closeMessage() {
      document.getElementById("popup").style.display = "none";
    }
  </script>

</body>
</html>
